<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DreamStack — moving on…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>
  :root {
    --bg: #07080B;
    --panel: #0F1116;
    --line: #1D212B;
    --ink: #E7E9EE;
    --ink-2: #9AA0AB;
    --ink-3: #6B7280;
    --violet: #A78BFA;
    --violet-glow: rgba(167, 139, 250, .35);
    --blue: #60A5FA;
    --blue-glow: rgba(96, 165, 250, .35);
    --green: #34D399;
    --green-glow: rgba(52, 211, 153, .35);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background:
      radial-gradient(900px 600px at 50% 35%, rgba(167,139,250,.10), transparent 60%),
      radial-gradient(800px 500px at 50% 80%, rgba(96,165,250,.06), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Faint dot grid like DreamCatcher's canvas — ties the visual */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 1.5px);
    background-size: 22px 22px;
    pointer-events: none;
    mask-image: radial-gradient(60% 60% at 50% 50%, #000 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(60% 60% at 50% 50%, #000 40%, transparent 100%);
  }

  .stage {
    position: relative;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 0 32px;
  }

  /* Top kicker */
  .kicker {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-3);
    opacity: 0;
    transform: translateY(-6px);
    animation: fadeDown .5s .1s forwards;
  }

  .headline {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -.02em;
    color: #fff;
    margin: 0;
    text-align: center;
    line-height: 1.18;
    max-width: 720px;
    text-wrap: pretty;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeDown .55s .25s forwards;
  }
  .headline .accent { color: var(--accent-color, var(--ink)); }
  .headline .next   { color: var(--next-color,  var(--ink)); }

  .sub {
    margin: -34px 0 0;
    color: var(--ink-2);
    font-size: 14.5px;
    letter-spacing: -.005em;
    text-align: center;
    max-width: 640px;
    line-height: 1.55;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeDown .55s .42s forwards;
  }

  /* ---------------- Pipeline ---------------- */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeDown .55s .55s forwards;
  }

  .stage-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 200px;
    padding: 22px 18px 20px;
    background: rgba(255,255,255,.02);
    border: 1px solid var(--line);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    transition:
      border-color .4s ease,
      background .4s ease,
      box-shadow .4s ease,
      filter .5s ease,
      opacity .5s ease;
  }
  .stage-card .ico-wrap {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 24px;
    transition: background .4s ease, border-color .4s ease, color .4s ease;
  }
  .stage-card .ico-wrap i { display: block; line-height: 1; }
  .stage-card .name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -.005em;
    color: #fff;
    position: relative;
  }
  .stage-card .role {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* Strike-through line drawn over the just-completed stage's name */
  .stage-card .name::after {
    content: "";
    position: absolute;
    left: -4px; right: -4px;
    top: 52%;
    height: 2px;
    background: currentColor;
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform .55s cubic-bezier(.65,.05,.36,1) .9s;
  }
  .stage-card.done .name::after { transform: scaleX(1); }

  /* Per-stage accent colors */
  .stage-card[data-stage="catcher"] .ico-wrap { color: var(--violet); }
  .stage-card[data-stage="studio"]  .ico-wrap { color: var(--blue); }
  .stage-card[data-stage="factory"] .ico-wrap { color: var(--green); }

  /* "Done" — soft, faded, struck-through */
  .stage-card.done {
    border-color: var(--line);
    background: rgba(255,255,255,.015);
    filter: saturate(.55);
    opacity: .55;
  }
  .stage-card.done .ico-wrap {
    background: rgba(255,255,255,.025);
  }
  .stage-card.done .name { color: var(--ink-2); }

  /* "From" — same as done, but with a check-chip overlay that fades in */
  .stage-card .check {
    position: absolute;
    top: -10px; right: -10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green);
    color: #07080B;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 0 4px rgba(52,211,153,.18), 0 6px 18px rgba(52,211,153,.32);
    opacity: 0;
    transform: scale(.6);
    transition: opacity .4s ease .6s, transform .45s cubic-bezier(.2,1.4,.5,1) .6s;
  }
  .stage-card.done .check { opacity: 1; transform: scale(1); }

  /* "Active" — pulses, tinted by stage color */
  .stage-card.active {
    border-color: var(--accent, var(--violet));
    background:
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
    box-shadow:
      0 0 0 1px var(--accent, var(--violet)) inset,
      0 0 28px var(--accent-glow, var(--violet-glow));
    animation: activePulse 2.2s ease-in-out infinite;
    animation-delay: 1.0s;
    cursor: pointer;
  }
  .stage-card.active:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1.5px var(--accent, var(--violet)) inset,
      0 0 56px var(--accent-glow, var(--violet-glow));
    animation-play-state: paused;
  }
  .stage-card.active:active {
    transform: translateY(0);
  }
  .stage-card.active .ico-wrap {
    background: color-mix(in oklab, var(--accent) 22%, transparent);
    border-color: color-mix(in oklab, var(--accent) 60%, transparent);
    color: #fff;
  }

  /* Click-me badge that hovers above the active card after the entrance
     animation has settled — replaces the auto-forward affordance. */
  .stage-card .enter-cta {
    position: absolute;
    top: -18px; left: 50%;
    transform: translate(-50%, -4px);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px 6px 10px;
    background: var(--accent, var(--violet));
    color: #07080B;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow:
      0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent),
      0 8px 22px color-mix(in oklab, var(--accent) 32%, transparent);
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease, transform .35s ease;
    z-index: 2;
  }
  .stage-card .enter-cta::after {
    content: "→";
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    line-height: 1;
    transform: translateY(-.5px);
  }
  .stage-card.active .enter-cta {
    opacity: 1;
    transform: translate(-50%, 0);
    /* Land after the active-pulse has had one cycle to read. */
    transition-delay: 1.5s;
  }
  .stage-card.active:hover .enter-cta {
    transform: translate(-50%, -2px);
  }

  /* Color tokens applied by JS */
  .stage-card[data-accent="violet"] { --accent: var(--violet); --accent-glow: var(--violet-glow); }
  .stage-card[data-accent="blue"]   { --accent: var(--blue);   --accent-glow: var(--blue-glow); }
  .stage-card[data-accent="green"]  { --accent: var(--green);  --accent-glow: var(--green-glow); }

  /* ---------------- Arrows / connectors ---------------- */
  .arrow {
    position: relative;
    width: 64px;
    height: 2px;
    background: var(--line);
    border-radius: 2px;
    overflow: visible;
  }
  .arrow .fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, var(--from-color, var(--violet)), var(--to-color, var(--blue)));
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 1.1s cubic-bezier(.65,.05,.36,1);
  }
  .arrow.lit .fill { transform: scaleX(1); }
  .arrow .head {
    position: absolute;
    right: -8px;
    top: 50%;
    transform: translateY(-50%) translateX(-6px);
    width: 0; height: 0;
    border: 5px solid transparent;
    border-left-color: var(--to-color, var(--blue));
    opacity: 0;
    transition: opacity .35s ease 1.0s, transform .35s ease 1.0s;
  }
  .arrow.lit .head {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  /* Travelling pulse along the lit arrow — reads as flow */
  .arrow .pulse {
    position: absolute;
    top: 50%;
    left: 0;
    width: 14px; height: 14px;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 50%;
    background: var(--to-color, var(--blue));
    box-shadow: 0 0 18px var(--to-color, var(--blue));
    opacity: 0;
    pointer-events: none;
  }
  .arrow.lit .pulse {
    animation: arrowPulse 1.4s cubic-bezier(.55,.05,.4,1) .35s forwards;
  }
  @keyframes arrowPulse {
    0%   { left: 0;     opacity: 0;   transform: translate(-50%, -50%) scale(.4); }
    25%  { opacity: 1; }
    100% { left: 100%;  opacity: 0;   transform: translate(-50%, -50%) scale(1); }
  }

  /* ---------------- Footer hint ---------------- */
  .footer {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeDown .5s 1.3s forwards;
  }
  .footer-arrow {
    display: inline-flex;
    width: 14px; height: 14px;
    align-items: center; justify-content: center;
    color: var(--ink-2);
    animation: nudge 1.6s ease-in-out infinite;
  }
  @keyframes nudge {
    0%, 100% { transform: translateY(-2px); }
    50%      { transform: translateY(0); }
  }

  /* ---------------- Anims ---------------- */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes activePulse {
    0%, 100% {
      box-shadow:
        0 0 0 1px var(--accent) inset,
        0 0 24px var(--accent-glow);
    }
    50% {
      box-shadow:
        0 0 0 1px var(--accent) inset,
        0 0 44px var(--accent-glow);
    }
  }

  /* Tighter on small screens (just in case) */
  @media (max-width: 720px) {
    .pipeline { gap: 8px; flex-direction: column; }
    .arrow { width: 2px; height: 28px; }
    .arrow .fill { width: 100%; height: 100%; transform-origin: top center; transform: scaleY(0); background: linear-gradient(180deg, var(--from-color), var(--to-color)); }
    .arrow.lit .fill { transform: scaleY(1); }
    .arrow .head { right: 50%; top: auto; bottom: -6px; transform: translateX(50%) translateY(-4px) rotate(90deg); border-left-color: var(--to-color); }
    .arrow.lit .head { transform: translateX(50%) translateY(0) rotate(90deg); }
    .stage-card { width: 220px; }
    .headline { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="kicker" id="kicker">DreamStack · Stage Transition</div>

  <h1 class="headline" id="headline"></h1>
  <p class="sub" id="sub"></p>

  <div class="pipeline" id="pipeline">
    <div class="stage-card" data-stage="catcher" data-accent="violet">
      <div class="ico-wrap"><i class="ph ph-microphone"></i></div>
      <div class="name">DreamCatcher</div>
      <div class="role">Capture</div>
      <div class="check"><i class="ph-bold ph-check"></i></div>
      <div class="enter-cta">Enter</div>
    </div>
    <div class="arrow" data-pair="catcher-studio"
         style="--from-color: var(--violet); --to-color: var(--blue);">
      <div class="fill"></div>
      <div class="pulse"></div>
      <div class="head"></div>
    </div>
    <div class="stage-card" data-stage="studio" data-accent="blue">
      <div class="ico-wrap"><i class="ph ph-pencil-ruler"></i></div>
      <div class="name">DreamStudio</div>
      <div class="role">Architect</div>
      <div class="check"><i class="ph-bold ph-check"></i></div>
      <div class="enter-cta">Enter</div>
    </div>
    <div class="arrow" data-pair="studio-factory"
         style="--from-color: var(--blue); --to-color: var(--green);">
      <div class="fill"></div>
      <div class="pulse"></div>
      <div class="head"></div>
    </div>
    <div class="stage-card" data-stage="factory" data-accent="green">
      <div class="ico-wrap"><i class="ph ph-squares-four"></i></div>
      <div class="name">DreamFactory</div>
      <div class="role">Build</div>
      <div class="check"><i class="ph-bold ph-check"></i></div>
      <div class="enter-cta">Enter</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-arrow">↑</span>
    <span id="footnote">Click to enter</span>
  </div>
</div>

<script>
  // ------------------------------------------------------------
  // Read ?from=&to= and orchestrate the strike-through animation.
  // ------------------------------------------------------------
  // Read ?from=&to= and orchestrate the strike-through animation.
  // No `from` = intro mode: nothing's been done yet, the first stage
  // (DreamCatcher by default) is the active/clickable one. This is
  // what the demo opens on — frames the whole pipeline before we
  // drop into the first surface.
  // ------------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const rawFrom = params.get("from");
  const from = rawFrom || null;                         // null in intro mode
  const to   = params.get("to") || (from ? "studio" : "catcher");
  const isIntro = !from;

  const STAGE_META = {
    catcher: { name: "DreamCatcher", role: "Capture",   color: "var(--violet)", verb: "Captured the conversation",   roleVerb: "capturing",    href: "DreamCatcher.html" },
    studio:  { name: "DreamStudio",  role: "Architect", color: "var(--blue)",   verb: "Locked in the architecture",  roleVerb: "architecting", href: "DreamStudio.html" },
    factory: { name: "DreamFactory", role: "Build",     color: "var(--green)",  verb: "Shipped to production",       roleVerb: "building",     href: "DreamFactory.html" },
  };

  const fromMeta = from ? STAGE_META[from] : null;
  const toMeta   = STAGE_META[to] || STAGE_META.catcher;

  // ---- Headline + subline copy ----
  const headlineEl = document.getElementById("headline");
  const subEl      = document.getElementById("sub");
  const kickerEl   = document.getElementById("kicker");
  const footnoteEl = document.getElementById("footnote");

  if (isIntro) {
    // Opening slide. Frame the whole pipeline; promise what's coming.
    kickerEl.textContent = "DreamStack · End-to-end demo";
    headlineEl.innerHTML =
      `One conversation.<br/>` +
      `<span class="next" style="color:${toMeta.color}">A working product.</span>`;
    subEl.textContent =
      "Three surfaces, one workflow. Capture intent in DreamCatcher, lock the architecture in DreamStudio, ship from DreamFactory. Start when you're ready.";
  } else {
    headlineEl.innerHTML =
      `${fromMeta.verb}.<br/>` +
      `<span class="next" style="color:${toMeta.color}">Now ${toMeta.roleVerb} in ${toMeta.name}</span>.`;

    // Stage-specific subline so each handoff feels distinct.
    const SUB_COPY = {
      "catcher-studio":
        "The ontology lives. An engineer takes it from here — turning the conversation into a shippable architecture.",
      "studio-factory":
        "The architecture is the contract. Eight specialised agents pick up scope and start building in parallel.",
    };
    subEl.textContent = SUB_COPY[`${from}-${to}`] || `Heading into ${toMeta.name}…`;
  }
  // Footer copy is a presenter cue — they advance with a click.
  footnoteEl.textContent = isIntro
    ? `Click ${toMeta.name} to start`
    : `Click ${toMeta.name} to enter`;

  // ---- Animation orchestration ----
  const cards  = document.querySelectorAll(".stage-card");
  const arrows = document.querySelectorAll(".arrow");

  // Compute each card's role relative to this transition:
  //   • intro mode (fromIdx = -1): no card is `done`; only the `to`
  //     card pulses. Arrows stay neutral.
  //   • mid-pipeline: cards before & at `from` get `done`; `to` pulses.
  const STAGES = ["catcher", "studio", "factory"];
  const fromIdx = from ? STAGES.indexOf(from) : -1;
  const toIdx   = STAGES.indexOf(to);

  // Fire after a brief delay so the entrance fades have time to land.
  setTimeout(() => {
    cards.forEach(card => {
      const stage = card.getAttribute("data-stage");
      const idx = STAGES.indexOf(stage);
      if (fromIdx >= 0 && idx <= fromIdx) {
        // Earlier (or current "from") stage already completed.
        card.classList.add("done");
      } else if (idx === toIdx) {
        // Hold off the active pulse for a beat so the check on the
        // outgoing card lands first. In intro mode (no outgoing card)
        // this delay is mostly cosmetic — gives the entrance fade
        // time to settle before the pulse begins.
        setTimeout(() => card.classList.add("active"), isIntro ? 250 : 700);
      }
    });

    // Light up only the arrow between from→to (and any earlier ones,
    // which represent already-traversed handoffs). In intro mode no
    // arrows light — the pipeline is showing what's *about to* happen.
    arrows.forEach(arrow => {
      const [a, b] = arrow.getAttribute("data-pair").split("-");
      const aIdx = STAGES.indexOf(a);
      const bIdx = STAGES.indexOf(b);
      if (fromIdx >= 0 && bIdx <= fromIdx) {
        // Already traversed — light immediately, no pulse.
        arrow.classList.add("lit");
      } else if (aIdx === fromIdx && bIdx === toIdx) {
        // The active hop — light it with a slight delay so the eye
        // tracks "from card → arrow → to card" in sequence.
        setTimeout(() => arrow.classList.add("lit"), 350);
      }
    });
  }, 60);

  // ---- Presenter advances by clicking the active (next-stage) card ----
  // No auto-forward — the demo waits on stage so the audience can read
  // the recap. The next-stage card is the only thing that's clickable;
  // its hover and CTA chip make the affordance unmistakeable.
  //
  // ?auto=<ms> is a presenter override for kiosk mode if anyone ever
  // wants timed advancement. ?freeze=1 disables BOTH auto-forward and
  // the click handler — useful for previewing without accidentally
  // triggering navigation.
  const autoMs = parseInt(params.get("auto") || "0", 10);
  const freeze = params.get("freeze") === "1";
  const activeCard = document.querySelector(`.stage-card[data-stage="${to}"]`);
  const goToDest = () => {
    const dest = new URL(toMeta.href, location.href);
    dest.searchParams.set("via", "transition");
    location.replace(dest.toString());
  };
  if (activeCard && !freeze) {
    activeCard.addEventListener("click", goToDest);
  }
  if (autoMs > 0 && !freeze) {
    setTimeout(goToDest, autoMs);
  }
</script>
</body>
</html>

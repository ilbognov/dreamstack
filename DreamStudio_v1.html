<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DreamStudio — Claims Portal Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ds-styles.css"/>
<link rel="stylesheet" href="ds-extras.css?v=10"/>
<style>
  /* Scale-to-fit stage — mirrors DreamCatcher for consistent demo framing. */
  html, body { background:#000; }
  #ds-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; overflow: hidden;
  }
  #ds-frame {
    position: relative;
    width: 1440px; height: 872px;
    transform-origin: center center;
    flex: 0 0 auto;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,.55);
  }
  #ds-frame .ds-app { width: 1440px !important; height: 872px !important; }
</style>
</head>
<body>

<div id="ds-stage">
  <div id="ds-frame">
    <div id="root"></div>
  </div>
</div>

<script>
  (function(){
    var DESIGN_W = 1440, DESIGN_H = 872;
    var frame = document.getElementById('ds-frame');
    function fit(){
      var s = Math.min(window.innerWidth/DESIGN_W, window.innerHeight/DESIGN_H);
      frame.style.transform = 'scale(' + s + ')';
    }
    fit();
    window.addEventListener('resize', fit);
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

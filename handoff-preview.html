<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Handoff Screen Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0f;
    font-family: 'Geist', 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* Ease the whole page in when arriving from the DreamCatcher handoff
     animation (?from=handoff). Otherwise show instantly. */
  body[data-from="handoff"] .handoff-overlay {
    animation: hp-page-fadein .9s cubic-bezier(.2,.8,.2,1) both;
  }
  body[data-from="handoff"] .handoff-center {
    animation: hp-center-rise 1.1s cubic-bezier(.2,.8,.2,1) .15s both;
  }
  @keyframes hp-page-fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes hp-center-rise {
    from { opacity: 0; transform: translateY(28px) scale(.985); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* Full-viewport container */
  .handoff-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0d0d0f;
  }

  /* ---- Animated halftone dot field ---- */
  .dc-bgdots {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .dc-bgdots::after {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.32) 1px, transparent 1.6px);
    background-size: 14px 14px;
    mask-image:
      linear-gradient(to bottom, transparent 50%, #000 88%, #000 100%),
      radial-gradient(ellipse 70% 60% at 50% 100%, #000 30%, transparent 95%);
    mask-composite: intersect;
    -webkit-mask-image:
      linear-gradient(to bottom, transparent 50%, #000 88%, #000 100%),
      radial-gradient(ellipse 70% 60% at 50% 100%, #000 30%, transparent 95%);
    -webkit-mask-composite: source-in;
    animation: dc-dots-fade 6s ease-in-out infinite;
    opacity: .4;
  }
  @keyframes dc-dots-fade {
    0%, 100% { opacity: .3; }
    50%       { opacity: .55; }
  }
  .dc-bgdots::before {
    content: "";
    position: absolute;
    width: 50%; height: 70%;
    left: 25%; bottom: -10%;
    background: radial-gradient(circle, rgba(255,255,255,.16) 0%, rgba(255,255,255,.07) 35%, transparent 65%);
    filter: blur(28px);
    animation: dc-glow-wave 10s ease-in-out infinite;
    mix-blend-mode: screen;
    z-index: 1;
  }
  @keyframes dc-glow-wave {
    0%   { transform: translate(-50%, 0);   opacity: .6; }
    25%  { transform: translate(-15%, -8%); opacity: .95; }
    50%  { transform: translate(20%, 4%);   opacity: .8; }
    75%  { transform: translate(45%, -6%);  opacity: .95; }
    100% { transform: translate(-50%, 0);   opacity: .6; }
  }

  /* ---- Central column ---- */
  .handoff-center {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
  }

  /* ---- Outer frosted card ---- */
  .handoff-outer-card {
    display: flex; flex-direction: column;
    align-items: center; gap: 24px;
    background: linear-gradient(180deg, rgba(26,26,30,.88) 0%, rgba(18,18,22,.88) 100%);
    border: 1px solid rgba(255,255,255,.055);
    border-radius: 18px;
    padding: 40px 52px 36px;
    box-shadow: 0 32px 90px rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
  }

  /* ---- Header ---- */
  .handoff-header {
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }
  .handoff-done-label {
    font-size: 15px;
    color: rgba(200,205,212,.75);
    letter-spacing: -0.01em;
  }
  .handoff-brand-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: #111215;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 11px 22px;
    color: #E6E8EB;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.02em;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }
  .handoff-brand-logo { height: 28px; width: auto; display: block; transition: opacity .5s ease; }
  .handoff-brand-pill { position: relative; }
  .handoff-brand-logo.is-swap {
    position: absolute;
    left: 22px; top: 50%; transform: translateY(-50%);
    opacity: 0;
  }
  body.logo-swapped .handoff-brand-logo.is-base { opacity: 0; }
  body.logo-swapped .handoff-brand-logo.is-swap { opacity: 1; }

  /* ---- Inner project card — dashed amber border ---- */
  .handoff-card {
    width: 356px;
    background: #0f1014;
    border: 1.5px dashed rgba(163,142,60,.55);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- Folder tabs row ---- */
  .handoff-tabs {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    padding: 14px 0 0 14px;
    gap: 0;
    flex-shrink: 0;
  }
  .handoff-tab {
    height: 52px;
    border-radius: 9px 9px 0 0;
    flex-shrink: 0;
    position: relative;
    /* extend each tab down a few px so it tucks INTO the folder body
       (creates a unified document-in-folder silhouette) */
    margin-bottom: -8px;
    padding-bottom: 8px;
    box-shadow: inset 0 -10px 16px rgba(0,0,0,.18);
  }
  .handoff-tab:nth-child(1) { z-index: 4; width: 96px;  margin-right: -7px; }
  .handoff-tab:nth-child(2) { z-index: 3; width: 92px;  margin-right: -7px; }
  .handoff-tab:nth-child(3) { z-index: 2; width: 105px; margin-right: -7px; }
  .handoff-tab:nth-child(4) { z-index: 1; flex: 1; border-radius: 9px 0 0 0; }

  /* ---- Card body — sits below the tabs ---- */
  .handoff-card-body {
    background: #1a1b1f;
    border-radius: 8px 8px 0 0;
    flex: 1;
    min-height: 155px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    z-index: 5;
    box-shadow: 0 -2px 0 rgba(255,255,255,.04);
  }

  /* ---- Card meta ---- */
  .handoff-card-meta {
    padding: 16px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .handoff-project-name {
    font-size: 13px; line-height: 1.45;
    color: #C0C6CE; font-weight: 500;
  }
  .handoff-company {
    font-size: 12px;
    color: rgba(107,114,128,.85);
  }

  /* ---- Converting label ---- */
  .handoff-converting {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Geist Mono', 'SF Mono', ui-monospace, monospace;
    font-size: 12px;
    color: #A3924A;
    letter-spacing: .07em;
  }
  .handoff-spinner {
    color: #A3924A;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ============================================================
     Ready state — after 3 s the inner project card cross-fades
     from the folder-tab "Converting…" state into a finished
     "Ready" card with metrics + Handoff/Exit CTAs.
     ============================================================ */

  /* The two cards live in a stack and cross-fade. Width is the
     shared sizing slot for the inner card + the action buttons. */
  .handoff-card-stack {
    position: relative;
    width: 460px;
    min-height: 240px;
  }
  .handoff-card-stack > .handoff-card,
  .handoff-card-stack > .handoff-card-ready {
    position: absolute;
    inset: 0;
    width: 100%;
    transition: opacity .45s ease, transform .55s cubic-bezier(.22,.9,.32,1);
  }
  .handoff-card-stack > .handoff-card {
    width: 100%;
    opacity: 1;
    transform: scale(1);
  }
  body.ready .handoff-card-stack > .handoff-card {
    opacity: 0;
    transform: scale(.985);
    pointer-events: none;
  }

  .handoff-card-ready {
    background: #15161a;
    border: 1.5px dashed rgba(74,222,128,.55);
    border-radius: 14px;
    padding: 18px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: scale(1.01);
    pointer-events: none;
  }
  body.ready .handoff-card-ready {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
    transition-delay: .08s;
  }
  .handoff-ready-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .handoff-ready-status {
    display: inline-block;
    width: 26px; height: 12px;
    border-radius: 999px;
    background: #22C55E;
    box-shadow: 0 0 0 3px rgba(34,197,94,.15);
  }
  .handoff-ready-more {
    background: transparent; border: 0;
    color: rgba(255,255,255,.55);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .handoff-ready-more:hover { background: rgba(255,255,255,.05); color: #fff; }
  .handoff-ready-title {
    font-size: 16px; line-height: 1.35;
    color: #E6E8EB; font-weight: 500;
    letter-spacing: -0.01em;
    margin-top: 6px;
    text-wrap: pretty;
  }
  .handoff-ready-company {
    font-size: 13px;
    color: rgba(140,148,158,.95);
    margin-bottom: 22px;
  }
  .handoff-ready-metrics {
    display: flex; align-items: center; gap: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .handoff-ready-metric {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px;
    color: #C8CDD3;
  }
  .handoff-ready-metric-ring { flex: 0 0 auto; }
  .handoff-ready-foot {
    font-size: 12px;
    color: rgba(120,128,138,.9);
    padding-top: 10px;
  }

  /* Status line — Converting↔Ready cross-fade */
  .handoff-status {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    min-height: 18px;
  }
  .handoff-status .handoff-converting,
  .handoff-status .handoff-ready-label {
    transition: opacity .35s ease;
  }
  .handoff-status .handoff-ready-label {
    position: absolute;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    color: #22C55E;
    opacity: 0;
    pointer-events: none;
  }
  body.ready .handoff-status .handoff-converting { opacity: 0; }
  body.ready .handoff-status .handoff-ready-label { opacity: 1; }

  /* Action buttons — appear with the ready state */
  .handoff-actions {
    display: flex; flex-direction: column;
    gap: 10px;
    width: 460px;
    margin-top: 14px;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity .4s ease .15s, transform .5s cubic-bezier(.22,.9,.32,1) .15s;
  }
  body.ready .handoff-actions {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .handoff-action {
    height: 52px;
    border-radius: 999px;
    border: 0;
    font-family: inherit;
    font-size: 15px; font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .25s ease, background .2s ease;
  }
  .handoff-action-primary {
    background: #2F6FEB; color: #fff;
    box-shadow: 0 8px 24px rgba(47,111,235,.32);
  }
  .handoff-action-primary:hover {
    background: #4D86F2;
    box-shadow: 0 10px 28px rgba(47,111,235,.42);
  }
  .handoff-action-secondary {
    background: #2a2b30;
    color: #E6E8EB;
  }
  .handoff-action-secondary:hover { background: #34353b; }
  .handoff-action:active { transform: translateY(1px); }
</style>
</head>
<body>

<script>
  // Tag the body so the ease-in animation only plays when we arrived
  // from the DreamCatcher handoff flow (and not on a direct visit).
  try {
    var qs = new URLSearchParams(window.location.search);
    if (qs.get("from") === "handoff") {
      document.body.setAttribute("data-from", "handoff");
    }
  } catch (e) {}
</script>

<div class="handoff-overlay">
  <div class="dc-bgdots" aria-hidden="true"></div>

  <div class="handoff-center">
    <div class="handoff-outer-card">

      <div class="handoff-header">
        <span class="handoff-done-label">Your dream session is done</span>
        <div class="handoff-brand-pill">
          <img src="assets/dreamcatcher-logo.png" alt="DreamCatcher" class="handoff-brand-logo is-base" />
          <img src="assets/dreamstudio-logo.png" alt="DreamStudio" class="handoff-brand-logo is-swap" />
        </div>
      </div>

      <div class="handoff-card-stack">
        <div class="handoff-card">
          <div class="handoff-tabs">
            <div class="handoff-tab" style="background:#92400E;"></div>
            <div class="handoff-tab" style="background:#7C3AED;"></div>
            <div class="handoff-tab" style="background:#16A34A;"></div>
            <div class="handoff-tab" style="background:#2563EB;"></div>
          </div>
          <div class="handoff-card-body">
            <div class="handoff-card-meta">
              <div class="handoff-project-name">Process Ontology</div>
              <div class="handoff-company">TechCorp</div>
            </div>
          </div>
        </div>

        <div class="handoff-card-ready">
          <div class="handoff-ready-top">
            <span class="handoff-ready-status" aria-hidden="true"></span>
            <button class="handoff-ready-more" type="button" aria-label="More">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                <circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/>
              </svg>
            </button>
          </div>
          <div class="handoff-ready-title">Claims Intake &amp; Triage</div>
          <div class="handoff-ready-company">TechCorp</div>
          <div class="handoff-ready-metrics">
            <div class="handoff-ready-metric">
              <svg class="handoff-ready-metric-ring" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
                <circle cx="12" cy="12" r="9" fill="none" stroke="#e6e8eb" stroke-width="2" stroke-linecap="round"
                        stroke-dasharray="26.0 56.5" transform="rotate(-90 12 12)"/>
              </svg>
              <span>46% Process Coverage</span>
            </div>
            <div class="handoff-ready-metric">
              <svg class="handoff-ready-metric-ring" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
                <circle cx="12" cy="12" r="9" fill="none" stroke="#e6e8eb" stroke-width="2" stroke-linecap="round"
                        stroke-dasharray="42.97 56.5" transform="rotate(-90 12 12)"/>
              </svg>
              <span>76% Architecture</span>
            </div>
          </div>
          <div class="handoff-ready-foot">Just created</div>
        </div>
      </div>

    </div>

    <div class="handoff-status">
      <div class="handoff-converting">
        <svg class="handoff-spinner" viewBox="0 0 24 24" fill="none" width="14" height="14">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40 20" stroke-linecap="round"/>
        </svg>
        Converting ...
      </div>
      <div class="handoff-ready-label">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m4 12 5 5L20 6"/>
        </svg>
        Ready
      </div>
    </div>

    <div class="handoff-actions">
      <button class="handoff-action handoff-action-primary" type="button" onclick="window.location.href='DreamStudio.html?from=handoff'">Handoff to DreamStudio</button>
      <button class="handoff-action handoff-action-secondary" type="button">Exit without saving</button>
    </div>
  </div>
</div>

<script>
  // After 3 s, swap the inner card to the "Ready" state and reveal CTAs.
  // 1 s later, cross-fade the brand logo from DreamCatcher → DreamStudio.
  setTimeout(function(){ document.body.classList.add('ready'); }, 3000);
  setTimeout(function(){ document.body.classList.add('logo-swapped'); }, 4000);
</script>

<script>
  // Scale frame to fit viewport
  (function(){
    var frame = document.getElementById('frame');
    if (!frame) return;
    function fit(){
      var s = Math.min(window.innerWidth/1440, window.innerHeight/872);
      frame.style.transform = 'scale('+s+')';
    }
    fit(); window.addEventListener('resize', fit);
  })();
</script>

</body>
</html>

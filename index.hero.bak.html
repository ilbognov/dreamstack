<title>DreamStack</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  /* ------------------------------------------------------------
     Index landing — dark stage with the same animated dot field
     as StageTransition. A centered hero ("From conversation to
     production software.") and a single light capsule CTA that
     glows on hover. The Powered-by-ConquerAI mark sits anchored
     at the very bottom.
     ------------------------------------------------------------ */
  :root {
    --bg: #1A1A1A;
    --ink: #E8E8EA;
    --ink-2: #A8A9AB;
    --ink-3: #7C7E82;
    --paper: #F2F2F2;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* Animated halftone field — copied verbatim from StageTransition
     so the two pages share an identical background bed. */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.32) 1px, transparent 1.6px);
    background-size: 14px 14px;
    -webkit-mask-image:
      linear-gradient(to bottom, transparent 50%, #000 88%, #000 100%),
      radial-gradient(ellipse 70% 60% at 50% 100%, #000 30%, transparent 95%);
    -webkit-mask-composite: source-in;
            mask-image:
      linear-gradient(to bottom, transparent 50%, #000 88%, #000 100%),
      radial-gradient(ellipse 70% 60% at 50% 100%, #000 30%, transparent 95%);
            mask-composite: intersect;
    animation: dc-dots-fade 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    width: 50%; height: 70%;
    left: 25%; bottom: -10%;
    background: radial-gradient(circle, rgba(255,255,255,.16) 0%, rgba(255,255,255,.07) 35%, transparent 65%);
    filter: blur(28px);
    animation: dc-glow-wave 10s ease-in-out infinite;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes dc-dots-fade {
    0%,100% { opacity:.55; }
    50%      { opacity:.85; }
  }
  @keyframes dc-glow-wave {
    0%   { transform: translate(-50%, 0); opacity:.6; }
    25%  { transform: translate(-15%, -8%); opacity:.95; }
    50%  { transform: translate(20%, 4%); opacity:.8; }
    75%  { transform: translate(45%, -6%); opacity:.95; }
    100% { transform: translate(-50%, 0); opacity:.6; }
  }

  /* ============================================================
     Layout — header / hero / footer in a 1-column grid that
     fills the viewport.
     ============================================================ */
  .stage {
    position: relative;
    z-index: 1;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 28px 32px 28px;
  }

  /* ---- Top brand lockup (Powered by ConquerAI) ---- */
  .brand {
    display: inline-flex;
    align-items: center;
    justify-self: center;
    opacity: 0;
    animation: fadeUp .55s .05s forwards cubic-bezier(.2,.8,.2,1);
  }
  .brand img {
    display: block;
    height: 26px;
    width: auto;
    opacity: .7;
    filter: brightness(1.1);
  }
  .footer-spacer { height: 26px; }

  /* ---- Hero ---- */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    text-align: center;
    padding: 0 24px;
  }
  .headline {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400;
    font-size: clamp(40px, 6.6vw, 84px);
    line-height: 1.08;
    letter-spacing: -.025em;
    color: #fff;
    margin: 0;
    max-width: 14ch;
    text-wrap: balance;
    opacity: 0;
    animation: fadeUp .7s .15s forwards cubic-bezier(.2,.8,.2,1);
  }

  /* ---- CTA pill ---- */
  .cta {
    --pill-bg: #F2F0EA;
    --pill-bg-hover: #FFFFFF;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 26px 14px 28px;
    background: var(--pill-bg);
    color: #0E0E10;
    border: 0;
    border-radius: 999px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -.005em;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    isolation: isolate;
    transition:
      transform .25s cubic-bezier(.2,.8,.2,1),
      background-color .25s ease,
      box-shadow .35s ease;
    box-shadow:
      0 1px 0 rgba(255,255,255,.65) inset,
      0 -1px 0 rgba(0,0,0,.06) inset,
      0 6px 18px rgba(0,0,0,.45);
    opacity: 0;
    animation: fadeUp .7s .28s forwards cubic-bezier(.2,.8,.2,1);
  }
  .cta::before {
    /* glow halo, hidden by default, eased in on hover */
    content: "";
    position: absolute; inset: -8px;
    border-radius: 999px;
    background: radial-gradient(60% 120% at 50% 50%,
      rgba(120, 170, 255, .55) 0%,
      rgba(120, 170, 255, .25) 38%,
      rgba(120, 170, 255, 0) 70%);
    filter: blur(14px);
    opacity: 0;
    transition: opacity .35s ease;
    z-index: -1;
    pointer-events: none;
  }
  .cta:hover {
    background: var(--pill-bg-hover);
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.85) inset,
      0 -1px 0 rgba(0,0,0,.06) inset,
      0 10px 30px rgba(120, 170, 255, .35),
      0 0 0 1px rgba(255,255,255,.06);
  }
  .cta:hover::before { opacity: 1; }
  .cta:active { transform: translateY(0); }
  .cta:focus-visible { outline: 2px solid #4DA3FF; outline-offset: 6px; }
  .cta-icon {
    width: 22px; height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #0E0E10;
  }
  .cta-icon svg { display: block; width: 100%; height: 100%; }
  .cta-name { font-weight: 600; letter-spacing: -.01em; }
  .cta-prefix { font-weight: 400; color: #2a2a2c; }

  /* ---- Bottom Powered by ConquerAI mark ---- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 12px;
    opacity: 0;
    animation: fadeUp .7s .42s forwards cubic-bezier(.2,.8,.2,1);
  }
  .footer img {
    display: block;
    height: 26px;
    width: auto;
    opacity: .6;
    filter: brightness(1.1);
    transition: opacity .25s ease;
  }
  .footer img:hover { opacity: .85; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 720px) {
    .stage { padding: 20px 16px; }
    .hero { gap: 40px; }
    .footer img { height: 22px; }
  }
</style>
</head>
